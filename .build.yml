image: freebsd/latest
packages:
  - perl5
  - p5-Moose
  - p5-JSON
  - p5-JSON-MaybeXS
  - p5-libwww
  - p5-Readonly
  - p5-URI-Encode
  - p5-Config-INI
  - p5-Datetime
  - p5-DBD-Mysql
  - p5-DBI
  - p5-UNIVERSAL-Require
  - p5-Test-Deep
  - p5-Test-MockModule
  - libtest-exception-perl
  - p5-Cache-Cache
  - p5-Log-Log4perl
  - libdatetime-format-strptime-perl
  - libdigest-crc-perl
  - libuuid-tiny-perl
  - libmoosex-singleton-perl
  - libdancer2-perl
  - libconfig-ini-perl
  - p5-Time-Duration

sources:
  - https://git.sr.ht/~m6kvm/chleb-bible-search
environment:
  deploy: palmer@overchat.org
tasks:
  - setup: |
      cd chleb-bible-search/
  - build: |
      cd chleb-bible-search/
      perl Makefile.PL
      make
  - test: |
      cd chleb-bible-search/
      make test
