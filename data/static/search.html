<!-- Chleb Template -->
		<form class="search-form" method="GET" action="/1/search">
			<h2>Search Criteria</h2>

			<div class="form-group">
				<label for="term">Term(s)</label>
				<input type="text" id="term" name="term" placeholder="e.g. love, grace, salvation" value="__SEARCH_TERM__">
				<label>
					<input type="checkbox" id="wholeword" name="wholeword" value="true" __SEARCH_WHOLEWORD__> Exact match
				</label>
				<input type="hidden" id="wholeword_present" name="wholeword_present" value="true">
			</div>

			<div class="form-group">
				<label for="translations">Translation</label>
				<select id="translations" name="translations">
					__SEARCH_TRANSLATIONS__
				</select>
			</div>

			<div class="form-group">
				<label for="book">Book</label>
				<select id="book" name="book" __SEARCH_BOOK_DISABLED__>
					__SEARCH_BOOKS__
				</select>
			</div>

			<div class="form-group">
				<label for="limit">Limit</label>
				<input type="number" id="limit" name="limit" placeholder="__SEARCH_LIMIT_DEFAULT__" min="1" max="__SEARCH_LIMIT_MAX__" value="__SEARCH_LIMIT_VALUE__">
			</div>

			<div class="form-group">
				<label for="per_page">Per page</label>
				<input type="number" id="per_page" name="per_page" placeholder="__SEARCH_PER_PAGE_DEFAULT__" min="1" max="__SEARCH_PER_PAGE_MAX__" value="__SEARCH_PER_PAGE_VALUE__">
			</div>

			<input type="hidden" id="page" name="page" value="1">
			<input type="hidden" id="form" name="form" value="true">

			<button type="submit">Search</button>
			<button type="button" id="search-home">Home</button>
		</form>
		__SEARCH_RESULTS__
		<script>
			(function () {
				'use strict';

				var wholewordCookieName = 'wholeword';
				var previousSearchLimitCookieName = 'previousSearchLimit';
				var previousSearchPerPageCookieName = 'previousSearchPerPage';
				var form = document.querySelector('.search-form');
				var home = document.getElementById('search-home');
				var wholeword = document.getElementById('wholeword');
				var limit = document.getElementById('limit');
				var perPage = document.getElementById('per_page');
				var translation = document.getElementById('translations');
				var book = document.getElementById('book');
				var params = new URLSearchParams(window.location.search);

				function readCookie(name) {
					var prefix = name + '=';
					var cookies = document.cookie.split(';');

					for (var i = 0; i < cookies.length; i++) {
						var cookie = cookies[i].trim();
						if (cookie.indexOf(prefix) === 0) {
							return decodeURIComponent(cookie.substring(prefix.length));
						}
					}

					return '';
				}

				function writeCookie(name, value) {
					document.cookie = name + '=' + encodeURIComponent(value)
						+ '; Max-Age=31536000; Path=/; SameSite=Lax';
				}

				function preferredTranslation() {
					var requested = params.get('translations');
					if (requested) {
						return requested.split(',')[0];
					}

					var preferred = readCookie('preferredTranslation').split(',')[0];
					return preferred === 'default' || preferred === 'all' ? '' : preferred;
				}

				function populateBooks(booksByTranslation) {
					var selected = translation.value || 'kjv';
					book.innerHTML = '<option value="">---</option>';
					book.disabled = !selected || !booksByTranslation[selected];
					if (book.disabled) {
						return;
					}

					var selectedBook = params.get('book') || '';
					var books = booksByTranslation[selected];
					for (var i = 0; i < books.length; i++) {
						var option = document.createElement('option');
						option.value = books[i].shortName;
						option.textContent = books[i].name;
						option.selected = books[i].shortName === selectedBook;
						book.appendChild(option);
					}
				}

				function loadTranslations() {
					fetch('/1/info', { headers: { Accept: 'application/vnd.api+json' } })
						.then(function (response) {
							if (!response.ok) {
								throw new Error('Unable to load translation information');
							}
							return response.json();
						})
						.then(function (json) {
							var booksByTranslation = {};
							booksByTranslation.all = [];
							for (var optionIndex = translation.options.length - 1; optionIndex >= 2; optionIndex--) {
								translation.removeChild(translation.options[optionIndex]);
							}
							var bibles = json.included || [];
							for (var i = 0; i < bibles.length; i++) {
								if (bibles[i].type !== 'bible') {
									continue;
								}
								var attributes = bibles[i].attributes;
								var books = [];
								for (var bookIndex = 0; bookIndex < attributes.book_names_short.length; bookIndex++) {
									books.push({
										name: attributes.book_names_short_raw[bookIndex],
										shortName: attributes.book_names_short[bookIndex]
									});
								}
								booksByTranslation[attributes.translation] = books;
								for (var allBookIndex = 0; allBookIndex < books.length; allBookIndex++) {
									var allBook = books[allBookIndex];
									if (!booksByTranslation.all.some(function (item) { return item.shortName === allBook.shortName; })) {
										booksByTranslation.all.push(allBook);
									}
								}
								var option = document.createElement('option');
								option.value = attributes.translation;
								option.textContent = attributes.translation.toLowerCase()
									+ (attributes.year ? ' (' + attributes.year + ')' : '');
								translation.appendChild(option);
							}

							var preferred = preferredTranslation();
							if (preferred && booksByTranslation[preferred]) {
								translation.value = preferred;
							}
							populateBooks(booksByTranslation);
							translation.addEventListener('change', function () {
								params.delete('book');
								populateBooks(booksByTranslation);
							});
						})
						.catch(function () {});
				}

				if (!params.has('wholeword') && !params.has('wholeword_present')) {
					wholeword.checked = readCookie(wholewordCookieName) === 'true';
				}

				if (!params.has('limit')) {
					var previousSearchLimit = readCookie(previousSearchLimitCookieName);
					if (/^[0-9]+$/.test(previousSearchLimit) && parseInt(previousSearchLimit, 10) > 0) {
						limit.value = previousSearchLimit;
					}
				}

				if (!params.has('per_page')) {
					var previousSearchPerPage = readCookie(previousSearchPerPageCookieName);
					if (/^[0-9]+$/.test(previousSearchPerPage) && parseInt(previousSearchPerPage, 10) > 0) {
						perPage.value = previousSearchPerPage;
					}
				}

				loadTranslations();

				form.addEventListener('submit', function () {
					writeCookie(wholewordCookieName, wholeword.checked ? 'true' : 'false');
					if (/^[0-9]+$/.test(limit.value) && parseInt(limit.value, 10) > 0) {
						writeCookie(previousSearchLimitCookieName, limit.value);
					}
					if (/^[0-9]+$/.test(perPage.value) && parseInt(perPage.value, 10) > 0) {
						writeCookie(previousSearchPerPageCookieName, perPage.value);
					}
				});

				home.addEventListener('click', function () {
					window.location.href = '/';
				});
			}());
		</script>
