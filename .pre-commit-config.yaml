repos:
  - repo: local
    hooks:
      - id: trap-goose-corruption
        name: Block line-number/markdown corruption in lib/
        entry: bin/maint/trap-goose-corruption.sh
        language: system
        pass_filenames: false
      - id: run-perlcritic
        name: perlcritic
        entry: bin/maint/run-perlcritic.sh
        language: system
        pass_filenames: false
